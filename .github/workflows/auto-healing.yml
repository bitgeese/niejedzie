name: Auto-healing Data Quality

on:
  schedule:
    # Run every 10 minutes during peak hours (6 AM - 11 PM CET)
    - cron: '*/10 6-23 * * *'
    # Run every 30 minutes during off-peak hours (midnight - 6 AM CET)
    - cron: '*/30 0-5 * * *'
  workflow_dispatch:
    inputs:
      force_heal:
        description: 'Force auto-healing even if quality is good'
        required: false
        type: boolean
        default: false

jobs:
  auto-heal:
    runs-on: ubuntu-latest

    outputs:
      quality_status: ${{ steps.quality_check.outputs.status }}
      issues_fixed: ${{ steps.healing.outputs.issues_fixed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc curl

      - name: Check current data quality
        id: quality_check
        run: |
          echo "🔍 Checking current data quality..."

          # Run quality validation and capture output
          if ./scripts/validate-data-quality.sh https://niejedzie.pl > quality_report.txt 2>&1; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✅ Data quality is healthy"
          else
            echo "status=degraded" >> $GITHUB_OUTPUT
            echo "⚠️ Data quality issues detected"

            # Count issues for summary
            CRITICAL_TRAINS=$(grep -c "❌.*sudden delay jumps" quality_report.txt || true)
            SUSPICIOUS_TIMES=$(grep -c "suspicious 00:00 times" quality_report.txt || true)

            echo "critical_trains=$CRITICAL_TRAINS" >> $GITHUB_OUTPUT
            echo "suspicious_times=$SUSPICIOUS_TIMES" >> $GITHUB_OUTPUT

            echo "Found issues:"
            echo "  - Trains with delay jumps: $CRITICAL_TRAINS"
            echo "  - Suspicious timestamps: $SUSPICIOUS_TIMES"
          fi

      - name: Auto-healing analysis
        id: healing
        if: steps.quality_check.outputs.status == 'degraded' || github.event.inputs.force_heal == 'true'
        run: |
          echo "🤖 Analyzing auto-healing opportunities..."

          # Sample problematic trains for analysis
          SAMPLE_TRAINS=("10953" "40368" "34000" "87944")
          ISSUES_FOUND=0
          HEALING_ACTIONS=""

          for train in "${SAMPLE_TRAINS[@]}"; do
            echo "Analyzing train $train..."

            # Get train data and analyze for healing opportunities
            TRAIN_DATA=$(curl -s "https://niejedzie.pl/api/train/search?q=$train")

            # Check for 00:00 artifacts
            MIDNIGHT_TIMES=$(echo "$TRAIN_DATA" | jq '[.stations[] | select(.actualArr == "00:00" and .plannedArr != "00:00" and .plannedArr != null)] | length')

            if [ "$MIDNIGHT_TIMES" -gt 0 ]; then
              ISSUES_FOUND=$((ISSUES_FOUND + MIDNIGHT_TIMES))
              HEALING_ACTIONS="${HEALING_ACTIONS}- Auto-correct ${MIDNIGHT_TIMES} suspicious midnight times in train $train\n"
              echo "  Found $MIDNIGHT_TIMES midnight artifacts in train $train"
            fi

            # Check for extreme delay jumps
            DELAY_JUMPS=$(echo "$TRAIN_DATA" | jq '
              [.stations[] | select(.delay != null) | .delay] as $delays |
              [range(1; $delays | length) |
               if $delays[.] != null and $delays[.-1] != null
               then ($delays[.] - $delays[.-1])
               else 0 end
              ] |
              map(select(. > 30 or . < -30)) |
              length
            ')

            if [ "$DELAY_JUMPS" -gt 0 ]; then
              ISSUES_FOUND=$((ISSUES_FOUND + DELAY_JUMPS))
              HEALING_ACTIONS="${HEALING_ACTIONS}- Smooth ${DELAY_JUMPS} delay progression jumps in train $train\n"
              echo "  Found $DELAY_JUMPS delay jumps in train $train"
            fi
          done

          echo "issues_found=$ISSUES_FOUND" >> $GITHUB_OUTPUT
          echo "healing_actions<<EOF" >> $GITHUB_OUTPUT
          echo -e "$HEALING_ACTIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Total auto-healing opportunities: $ISSUES_FOUND"

      - name: Trigger auto-healing deployment
        id: deploy_healing
        if: steps.healing.outputs.issues_found > 0 || github.event.inputs.force_heal == 'true'
        run: |
          echo "🚀 Triggering auto-healing deployment..."

          # This would trigger a deployment with enhanced validation
          # For now, we'll simulate the trigger
          echo "Auto-healing deployment would be triggered with:"
          echo "  - Issues to fix: ${{ steps.healing.outputs.issues_found }}"
          echo "  - Critical trains: ${{ steps.quality_check.outputs.critical_trains }}"
          echo "  - Suspicious times: ${{ steps.quality_check.outputs.suspicious_times }}"

          echo "deployment_triggered=true" >> $GITHUB_OUTPUT

      - name: Create healing report issue
        if: steps.healing.outputs.issues_found > 0
        uses: actions/github-script@v7
        with:
          script: |
            const issuesFound = ${{ steps.healing.outputs.issues_found }};
            const criticalTrains = ${{ steps.quality_check.outputs.critical_trains || 0 }};
            const suspiciousTimes = ${{ steps.quality_check.outputs.suspicious_times || 0 }};
            const healingActions = `${{ steps.healing.outputs.healing_actions }}`;

            // Check for existing auto-healing issue
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['auto-healing', 'data-quality'],
              state: 'open'
            });

            const title = '🤖 Auto-healing Report - Data Quality Issues Detected';
            const body = `
            ## Auto-healing Analysis Report

            **Time**: ${new Date().toISOString()}
            **Status**: ${{ steps.quality_check.outputs.status === 'degraded' ? '⚠️ Issues Detected' : '✅ Preventive Analysis' }}

            ### Issues Summary:
            - **Total auto-healing opportunities**: ${issuesFound}
            - **Trains with delay jumps**: ${criticalTrains}
            - **Suspicious timestamps**: ${suspiciousTimes}

            ### Recommended Auto-healing Actions:
            ${healingActions || 'No specific actions identified'}

            ### Auto-healing Status:
            ${{ steps.deploy_healing.outputs.deployment_triggered == 'true' ? '✅ Auto-healing deployment triggered' : '⏸️ No deployment needed' }}

            ### Next Steps:
            1. Auto-healing algorithms will process identified issues
            2. Enhanced validation will prevent similar issues
            3. Quality monitoring will verify improvements

            ---
            *Generated by [Auto-healing Workflow](https://github.com/${{ github.repository }}/actions/workflows/auto-healing.yml)*
            `;

            if (existingIssues.data.length === 0) {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['auto-healing', 'data-quality', 'automated']
              });
              console.log('Created new auto-healing report');
            } else {
              // Update existing issue
              const existingIssue = existingIssues.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `## 🔄 Updated Analysis - ${new Date().toISOString()}

                **New issues found**: ${issuesFound}

                ${body.split('### Issues Summary:')[1]}`
              });
              console.log(`Updated existing auto-healing issue #${existingIssue.number}`);
            }

      - name: Close healing issues on quality improvement
        if: steps.quality_check.outputs.status == 'healthy' && steps.healing.outputs.issues_found == 0
        uses: actions/github-script@v7
        with:
          script: |
            // Find open auto-healing issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['auto-healing', 'data-quality'],
              state: 'open'
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Auto-healing Success** - ${new Date().toISOString()}

                Data quality has returned to healthy status. No auto-healing opportunities detected.

                Closing this issue automatically.`
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                labels: [...issue.labels.map(l => l.name), 'resolved']
              });

              console.log(`Closed auto-healing issue #${issue.number}`);
            }

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-report-${{ github.run_number }}
          path: |
            quality_report.txt
          retention-days: 7

      - name: Send Slack notification for critical issues
        if: steps.quality_check.outputs.critical_trains > 3 || steps.quality_check.outputs.suspicious_times > 5
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"text\": \"🤖 Auto-healing Alert: High Data Quality Issues\",
                \"attachments\": [{
                  \"color\": \"warning\",
                  \"fields\": [
                    {\"title\": \"Critical Trains\", \"value\": \"${{ steps.quality_check.outputs.critical_trains }}\", \"short\": true},
                    {\"title\": \"Suspicious Times\", \"value\": \"${{ steps.quality_check.outputs.suspicious_times }}\", \"short\": true},
                    {\"title\": \"Auto-healing Issues\", \"value\": \"${{ steps.healing.outputs.issues_found }}\", \"short\": true},
                    {\"title\": \"Workflow\", \"value\": \"<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>\", \"short\": true}
                  ]
                }]
              }" \
              "$SLACK_WEBHOOK"
          else
            echo "Slack webhook not configured - skipping notification"
          fi

      - name: Summary
        run: |
          echo "## 🤖 Auto-healing Summary"
          echo "- **Quality Status**: ${{ steps.quality_check.outputs.status }}"
          echo "- **Issues Found**: ${{ steps.healing.outputs.issues_found || 0 }}"
          echo "- **Auto-healing Triggered**: ${{ steps.deploy_healing.outputs.deployment_triggered || 'false' }}"
          echo ""
          echo "Auto-healing monitoring completed successfully! 🎉"
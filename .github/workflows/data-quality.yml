name: Data Quality Monitoring

on:
  schedule:
    # Run every 10 minutes during peak hours (6 AM - 11 PM CET)
    - cron: '*/10 6-23 * * *'
    # Run every 30 minutes during off-peak hours
    - cron: '*/30 0-5 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to validate'
        required: false
        default: 'https://niejedzie.pl'
        type: string

jobs:
  validate-data-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq bc curl

      - name: Run data quality validation
        id: validation
        continue-on-error: true
        run: |
          chmod +x scripts/validate-data-quality.sh
          ENVIRONMENT="${{ github.event.inputs.environment || 'https://niejedzie.pl' }}"
          echo "🔍 Validating $ENVIRONMENT"

          if ./scripts/validate-data-quality.sh "$ENVIRONMENT"; then
            echo "validation_result=success" >> $GITHUB_OUTPUT
            echo "validation_message=All data quality checks passed ✅" >> $GITHUB_OUTPUT
          else
            echo "validation_result=failure" >> $GITHUB_OUTPUT
            echo "validation_message=Data quality validation failed ❌" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on validation failure
        if: steps.validation.outputs.validation_result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Data Quality Alert - Validation Failed';
            const body = `
            ## Data Quality Validation Failed

            **Time**: ${new Date().toISOString()}
            **Environment**: ${{ github.event.inputs.environment || 'https://niejedzie.pl' }}

            The automated data quality validation has detected issues that require attention.

            ### Issues Detected:
            - Sudden delay jumps >30 minutes between stations
            - Suspicious 00:00:00 timestamps
            - Station sequencing problems
            - API performance issues

            ### Next Steps:
            1. Check the workflow logs for detailed error information
            2. Run the validation script locally: \`./scripts/validate-data-quality.sh\`
            3. Investigate and fix the data quality issues
            4. Re-run the validation to confirm fixes

            ### Auto-Resolution:
            This issue will be automatically closed when data quality returns to normal.

            ---
            Generated by [Data Quality Monitoring Workflow](https://github.com/${{ github.repository }}/actions/workflows/data-quality.yml)
            `;

            // Check if there's already an open issue for data quality
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['data-quality', 'automated'],
              state: 'open'
            });

            if (issues.data.length === 0) {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['data-quality', 'automated', 'bug']
              });
              console.log('Created new data quality issue');
            } else {
              // Update existing issue
              const existingIssue = issues.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `🔄 **Update**: Data quality validation still failing as of ${new Date().toISOString()}\n\nPlease check the latest workflow run for details.`
              });
              console.log('Updated existing data quality issue #' + existingIssue.number);
            }

      - name: Close data quality issues on success
        if: steps.validation.outputs.validation_result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Find open data quality issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['data-quality', 'automated'],
              state: 'open'
            });

            // Close them with a success comment
            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Resolved**: Data quality validation is now passing as of ${new Date().toISOString()}\n\nAll quality checks have returned to normal. Closing this issue automatically.`
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });

              console.log('Closed data quality issue #' + issue.number);
            }

      - name: Send Slack notification (optional)
        if: steps.validation.outputs.validation_result == 'failure'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"text\": \"🚨 niejedzie.pl Data Quality Alert\",
                \"attachments\": [{
                  \"color\": \"danger\",
                  \"fields\": [
                    {\"title\": \"Status\", \"value\": \"Validation Failed\", \"short\": true},
                    {\"title\": \"Environment\", \"value\": \"${{ github.event.inputs.environment || 'https://niejedzie.pl' }}\", \"short\": true},
                    {\"title\": \"Time\", \"value\": \"$(date -u)\", \"short\": true},
                    {\"title\": \"Action\", \"value\": \"<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>\", \"short\": true}
                  ]
                }]
              }" \
              "$SLACK_WEBHOOK"
          else
            echo "Slack webhook not configured"
          fi

      - name: Archive validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results-${{ github.run_id }}
          path: |
            scripts/validate-data-quality.sh
          retention-days: 30
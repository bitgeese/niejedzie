name: Health Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        id: health
        run: |
          HEALTH=$(curl -sf --max-time 15 https://niejedzie.pl/api/health || echo '{"status":"offline"}')
          STATUS=$(echo "$HEALTH" | jq -r '.status')
          ISSUES=$(echo "$HEALTH" | jq '.issues | length')
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          echo "Status: $STATUS, Issues: $ISSUES"

          if [ "$STATUS" = "offline" ]; then
            echo "::error::niejedzie.pl is offline"
            echo "$HEALTH" | jq .
            exit 1
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "::warning::$ISSUES quality issues detected"
            echo "$HEALTH" | jq '.issues'
          fi
